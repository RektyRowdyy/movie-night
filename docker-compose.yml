services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: movienight
      POSTGRES_PASSWORD: movienight
      POSTGRES_DB: movienight
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U movienight"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
